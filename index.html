          "acceptedAnswer": {
            "@type": "Answer",
            "text": "The FERS basic annuity is calculated as 1% of your high-3 average salary multiplied by your years of creditable service. If you retire at age 62 or later with at least 20 years of service, the multiplier increases to 1.1%."

          "acceptedAnswer": {
            "@type": "Answer",
